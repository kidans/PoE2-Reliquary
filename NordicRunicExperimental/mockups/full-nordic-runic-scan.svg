      <text x="26" y="31" class="mono vellum" font-size="17">Fate of the Vaal</text>
      <path d="M198 18l10 10 10-10" class="line" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="322" cy="24" r="24" class="button"/>
      <text x="315" y="30" class="mono accent" font-size="20">_</text>
      <circle cx="380" cy="24" r="24" class="button"/>
      <text x="374" y="31" class="mono accent" font-size="20">x</text>
    </g>

    <!-- floating spine -->
    <g transform="translate(-38 230)">
      <path d="M38 0v560" class="line-dim"/>
      <g filter="url(#accent-glow)">
