        <path d="M24 30h28M38 16v28M50 18l-24 24" stroke="#e6ffff" stroke-width="3" stroke-linecap="round"/>
      </g>
      <g transform="translate(0 96)">
        <path d="M38 0 70 30 38 60 6 30Z" fill="#061112" stroke="#2bd7c4" stroke-width="2" opacity=".88"/>
        <path d="M25 23h26M25 37h26M31 17l-10 13 10 13M45 17l10 13-10 13" stroke="#d7ffff" stroke-width="2.5" stroke-linecap="round"/>
