        <text x="86" y="0" class="mono gold" font-size="16">T2?</text>
        <text x="124" y="0" class="mono gold" font-size="16">P1</text>
        <rect x="172" y="-20" width="276" height="30" fill="#30325c" stroke="#aeb8ff"/>
