        <path d="M38 15v30M24 30h28M29 20l18 20M47 20 29 40" stroke="#d7ffff" stroke-width="2.2" stroke-linecap="round"/>
      </g>
      <g transform="translate(0 384)">
        <path d="M38 0 70 30 38 60 6 30Z" fill="#061112" stroke="#2bd7c4" stroke-width="2" opacity=".88"/>
        <circle cx="38" cy="30" r="13" fill="none" stroke="#d7ffff" stroke-width="2.2"/>
        <path d="M38 15v8M38 37v8M23 30h8M45 30h8" stroke="#d7ffff" stroke-width="2.2"/>
      </g>
