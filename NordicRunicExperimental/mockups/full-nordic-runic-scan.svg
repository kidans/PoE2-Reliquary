<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#030506"/>
      <stop offset="0.38" stop-color="#071011"/>
      <stop offset="0.68" stop-color="#050607"/>
      <stop offset="1" stop-color="#010202"/>
    </linearGradient>
    <radialGradient id="accent-haze" cx="72%" cy="16%" r="70%">
      <stop stop-color="#2bd7c4" stop-opacity="0.22"/>
      <stop offset="0.34" stop-color="#2bd7c4" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#2bd7c4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="danger-haze" cx="8%" cy="72%" r="60%">
      <stop stop-color="#ff465a" stop-opacity="0.16"/>
      <stop offset="0.34" stop-color="#ff465a" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#ff465a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="iron-panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#071012" stop-opacity="0.96"/>
      <stop offset="0.5" stop-color="#030606" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#09090a" stop-opacity="0.96"/>
    </linearGradient>
    <linearGradient id="stone-panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0a1516"/>
      <stop offset="0.52" stop-color="#050909"/>
      <stop offset="1" stop-color="#0c0a08"/>
    </linearGradient>
    <linearGradient id="rare-banner" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#0b0b0a"/>
      <stop offset="0.18" stop-color="#312911"/>
      <stop offset="0.5" stop-color="#17130a"/>
      <stop offset="0.82" stop-color="#312911"/>
      <stop offset="1" stop-color="#0b0b0a"/>
    </linearGradient>
    <pattern id="iron-grain" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M8 14h1M27 44h1M71 19h1M62 69h1M38 7h1M15 75h1" stroke="#ffffff" opacity="0.11"/>
      <path d="M3 32h30M42 30h27M12 58h58" stroke="#ffffff" opacity="0.025"/>
      <path d="M0 0l80 80M80 0 0 80" stroke="#2bd7c4" opacity="0.015"/>
    </pattern>
    <filter id="panel-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.58"/>
    </filter>
    <filter id="accent-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#2bd7c4" flood-opacity="0.72"/>
      <feDropShadow dx="0" dy="0" stdDeviation="13" flood-color="#2bd7c4" flood-opacity="0.26"/>
    </filter>
    <filter id="danger-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#ff465a" flood-opacity="0.82"/>
      <feDropShadow dx="0" dy="0" stdDeviation="13" flood-color="#ff465a" flood-opacity="0.36"/>
    </filter>
    <filter id="gold-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#d8b66b" flood-opacity="0.64"/>
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#d8b66b" flood-opacity="0.20"/>
    </filter>
    <style>
      .brand { font-family: Georgia, "Times New Roman", serif; font-weight: 800; letter-spacing: .24em; }
      .rune { font-family: Georgia, "Times New Roman", serif; font-weight: 800; letter-spacing: .12em; }
      .ui { font-family: "Segoe UI", Aptos, sans-serif; }
      .mono { font-family: Consolas, "Cascadia Mono", monospace; font-weight: 700; }
      .cap { font-family: Consolas, "Cascadia Mono", monospace; font-weight: 900; letter-spacing: .15em; text-transform: uppercase; }
      .small { font-size: 16px; }
      .muted { fill: #9aa7a6; }
      .vellum { fill: #eee3d8; }
      .accent { fill: #2bd7c4; }
      .danger { fill: #ff465a; }
      .gold { fill: #d8b66b; }
      .blue { fill: #aeb8ff; }
      .line { fill: none; stroke: #2bd7c4; stroke-width: 2; vector-effect: non-scaling-stroke; }
      .line-dim { fill: none; stroke: #2bd7c4; stroke-width: 1; opacity: .33; vector-effect: non-scaling-stroke; }
      .danger-line { fill: none; stroke: #ff465a; stroke-width: 2; vector-effect: non-scaling-stroke; }
      .gold-line { fill: none; stroke: #d8b66b; stroke-width: 2; vector-effect: non-scaling-stroke; }
      .stone { fill: url(#stone-panel); stroke: #2bd7c4; stroke-width: 1.4; }
      .button { fill: #071011; stroke: #2bd7c4; stroke-width: 1.5; }
      .button-danger { fill: #160506; stroke: #ff465a; stroke-width: 1.5; }
    </style>
