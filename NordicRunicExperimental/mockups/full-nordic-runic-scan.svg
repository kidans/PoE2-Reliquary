        <text x="-24" y="46" class="mono vellum" font-size="17">T3</text>
        <text x="4" y="46" class="mono danger" font-size="17">R</text>
        <text x="58" y="46" class="mono blue" font-size="17">18% Increased Physical Damage (Rune)</text>
