          <text x="18" y="34" class="mono gold" font-size="17">10 EXALTED</text>
          <text x="154" y="34" class="mono vellum" font-size="17">81</text>
          <text x="224" y="34" class="mono vellum" font-size="17">20%</text>
          <text x="304" y="34" class="mono vellum" font-size="17">7d</text>
