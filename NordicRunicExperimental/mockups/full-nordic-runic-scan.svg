        <text x="142" y="92" class="mono danger" font-size="16">E</text>
        <rect x="172" y="72" width="286" height="30" fill="#37422f" stroke="#d8b66b" filter="url(#gold-glow)"/>
        <text x="184" y="93" class="mono gold" font-size="17">+5 to Level of all Attack Skills</text>
        <text x="84" y="138" class="mono vellum" font-size="16">T1?</text>
        <text x="124" y="138" class="mono blue" font-size="16">S1</text>
        <text x="172" y="138" class="mono blue" font-size="17">15% Increased Attack Speed</text>
      </g>

      <g transform="translate(244 560)">
        <circle cx="0" cy="0" r="10" fill="#2bd7c4" filter="url(#accent-glow)"/>
