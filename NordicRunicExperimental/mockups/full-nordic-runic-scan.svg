      <text x="1260" y="42">ᛁ ᚱ ᛟ ᚾ</text>
      <text x="50" y="1048">ᚹ ᚨ ᚱ ᛞ</text>
      <text x="1268" y="1048">ᛊ ᛏ ᛟ ᚾ ᛖ</text>
    </g>

    <!-- header -->
