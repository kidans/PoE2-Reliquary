  <rect width="1600" height="1200" fill="url(#bg)"/>
  <rect width="1600" height="1200" fill="url(#accent-haze)"/>
  <rect width="1600" height="1200" fill="url(#danger-haze)"/>
  <rect width="1600" height="1200" fill="url(#iron-grain)" opacity="0.8"/>

  <!-- outer app shell -->
  <g transform="translate(72 56)" filter="url(#panel-shadow)">
    <path d="M0 34 34 0h1392l34 34v1018l-34 34H34L0 1052Z" fill="url(#iron-panel)" stroke="#2bd7c4" stroke-width="2"/>
    <path d="M15 44 44 15h1372l29 29v998l-29 29H44l-29-29Z" fill="none" stroke="#2bd7c4" stroke-opacity=".28"/>
    <path d="M42 15h230M1188 15h230M42 1071h230M1188 1071h230" class="line" opacity=".7"/>
    <path d="M15 180v260M15 650v260M1445 180v260M1445 650v260" class="line-dim"/>

    <!-- runic corner bindings -->
    <g class="rune" font-size="18" fill="#2bd7c4" opacity=".72">
