      .label { font-family: "Segoe UI", sans-serif; font-weight: 800; letter-spacing: .14em; text-transform: uppercase; }
      .mono { font-family: Consolas, "Cascadia Mono", monospace; font-weight: 700; }
      .body { font-family: "Segoe UI", sans-serif; }
      .small { font-size: 20px; opacity: .72; }
      .rune { font-family: Georgia, serif; font-weight: 800; }
      .thin { fill: none; stroke-width: 2; vector-effect: non-scaling-stroke; }
      .hair { fill: none; stroke-width: 1; vector-effect: non-scaling-stroke; }
