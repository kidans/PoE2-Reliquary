    <filter id="frost-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#7dd6ff" flood-opacity="0.5"/>
    </filter>
    <filter id="gold-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#d8b66b" flood-opacity="0.42"/>
    </filter>
    <pattern id="grain" width="90" height="90" patternUnits="userSpaceOnUse">
      <path d="M14 22h1M42 11h1M78 35h1M21 73h1M66 82h1M88 9h1" stroke="#ffffff" opacity="0.08"/>
      <path d="M8 47h28M52 58h18M30 38h41" stroke="#ffffff" opacity="0.025"/>
